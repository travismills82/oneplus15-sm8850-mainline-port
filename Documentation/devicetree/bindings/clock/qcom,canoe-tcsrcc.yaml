%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/qcom,canoe-tcsrcc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Qualcomm Canoe TCSR Clock Controller

maintainers:
  - Bjorn Andersson <andersson@kernel.org>

description: |
  The Top Control and Status Register clock controller on Canoe provides
  reference clock gates for PCIe, UFS, USB2 and USB3 consumers.

  See also:
    include/dt-bindings/clock/qcom,canoe-tcsr.h

properties:
  compatible:
    items:
      - const: qcom,canoe-tcsrcc
      - const: syscon

  reg:
    maxItems: 1

  '#clock-cells':
    const: 1

required:
  - compatible
  - reg
  - '#clock-cells'

additionalProperties: false

examples:
  - |
    clock-controller@1fd5044 {
      compatible = "qcom,canoe-tcsrcc", "syscon";
      reg = <0x01fd5044 0x1c>;
      #clock-cells = <1>;
    };
...

%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/qcom,canoe-gcc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Qualcomm Canoe Global Clock and Reset Controller

maintainers:
  - Bjorn Andersson <andersson@kernel.org>

description: |
  Qualcomm global clock control module providing clocks, resets and power
  domains on the Canoe platform.

  See also:
    include/dt-bindings/clock/qcom,gcc-canoe.h

properties:
  compatible:
    const: qcom,canoe-gcc

  clocks:
    items:
      - description: Board XO source
      - description: PCIe 0 pipe clock source
      - description: Sleep clock source
      - description: UFS PHY RX symbol 0 clock source
      - description: UFS PHY RX symbol 1 clock source
      - description: UFS PHY TX symbol 0 clock source
      - description: USB3 PHY wrapper pipe clock source

  clock-names:
    items:
      - const: bi_tcxo
      - const: pcie_0_pipe_clk
      - const: sleep_clk
      - const: ufs_phy_rx_symbol_0_clk
      - const: ufs_phy_rx_symbol_1_clk
      - const: ufs_phy_tx_symbol_0_clk
      - const: usb3_phy_wrapper_gcc_usb30_pipe_clk

required:
  - compatible
  - clocks
  - clock-names
  - '#power-domain-cells'

allOf:
  - $ref: qcom,gcc.yaml#

unevaluatedProperties: false

examples:
  - |
    clock-controller@100000 {
        compatible = "qcom,canoe-gcc";
        reg = <0x00100000 0x001f4200>;
        clocks = <&bi_tcxo>,
                 <&pcie0_pipe_clk>,
                 <&sleep_clk>,
                 <&ufs_rx0_clk>,
                 <&ufs_rx1_clk>,
                 <&ufs_tx0_clk>,
                 <&usb3_pipe_clk>;
        clock-names = "bi_tcxo",
                      "pcie_0_pipe_clk",
                      "sleep_clk",
                      "ufs_phy_rx_symbol_0_clk",
                      "ufs_phy_rx_symbol_1_clk",
                      "ufs_phy_tx_symbol_0_clk",
                      "usb3_phy_wrapper_gcc_usb30_pipe_clk";
        #clock-cells = <1>;
        #reset-cells = <1>;
        #power-domain-cells = <1>;
    };
...

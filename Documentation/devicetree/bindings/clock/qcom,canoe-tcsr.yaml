%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/qcom,canoe-tcsr.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Qualcomm Canoe TCSR Clock Controller

maintainers:
  - Bjorn Andersson <andersson@kernel.org>

description: |
  The TCSR clock controller on Qualcomm Canoe provides reference-clock
  gates for the PCIe, UFS, USB2 and USB3 PHY blocks.

  See also:
    include/dt-bindings/clock/qcom,canoe-tcsr.h

properties:
  compatible:
    const: qcom,canoe-tcsr

  reg:
    maxItems: 1

  '#clock-cells':
    const: 1

required:
  - compatible
  - reg
  - '#clock-cells'

additionalProperties: false

examples:
  - |
    #include <dt-bindings/clock/qcom,canoe-tcsr.h>

    clock-controller@1fd5044 {
      compatible = "qcom,canoe-tcsr";
      reg = <0x1fd5044 0x1c>;
      #clock-cells = <1>;
    };
...

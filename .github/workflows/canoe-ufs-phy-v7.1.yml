name: Canoe UFS PHY v7.1 port

on:
  pull_request:
    branches:
      - bringup/canoe-v7.1
    paths:
      - .github/workflows/canoe-ufs-phy-v7.1.yml
      - tools/oneplus15-port/ci/port_canoe_ufs_phy_v71.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  port-and-validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out UFS PHY port branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Fetch preserved Linux 6.12 branch
        run: |
          set -euxo pipefail
          git fetch --no-tags origin \
            backup/canoe-6.12-final-5555043:refs/remotes/origin/backup/canoe-6.12-final-5555043

      - name: Import Canoe UFS PHY data
        env:
          OLD_REF: origin/backup/canoe-6.12-final-5555043
        run: |
          set -euxo pipefail
          mkdir -p /tmp/canoe-ufs-phy-ci
          python3 tools/oneplus15-port/ci/port_canoe_ufs_phy_v71.py \
            2>&1 | tee /tmp/canoe-ufs-phy-ci/port.log
          git diff --check
          git status --short

      - name: Install kernel and schema dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            clang \
            flex \
            libelf-dev \
            libssl-dev \
            lld \
            llvm \
            make \
            python3-venv
          python3 -m venv .venv-dtschema
          .venv-dtschema/bin/pip install --upgrade pip
          .venv-dtschema/bin/pip install dtschema
          echo "$PWD/.venv-dtschema/bin" >> "$GITHUB_PATH"

      - name: Validate Canoe UFS PHY binding
        run: |
          set -euxo pipefail
          make \
            O=out/canoe-ufs-phy \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            DT_SCHEMA_FILES=Documentation/devicetree/bindings/phy/qcom,sc8280xp-qmp-ufs-phy.yaml \
            dt_binding_check \
            2>&1 | tee /tmp/canoe-ufs-phy-ci/dt-binding-check.log

      - name: Configure Linux 7.1.1 UFS PHY build
        run: |
          set -euxo pipefail
          make \
            O=out/canoe-ufs-phy \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            defconfig \
            2>&1 | tee /tmp/canoe-ufs-phy-ci/defconfig.log
          scripts/config \
            --file out/canoe-ufs-phy/.config \
            --enable PHY_QCOM_QMP_UFS
          make \
            O=out/canoe-ufs-phy \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            olddefconfig \
            2>&1 | tee /tmp/canoe-ufs-phy-ci/olddefconfig.log
          grep -qx 'CONFIG_PHY_QCOM_QMP_UFS=y' out/canoe-ufs-phy/.config
          cp out/canoe-ufs-phy/.config /tmp/canoe-ufs-phy-ci/config

      - name: Build Canoe-capable UFS PHY object
        run: |
          set -euxo pipefail
          make \
            O=out/canoe-ufs-phy \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            W=1 \
            -j2 \
            drivers/phy/qualcomm/phy-qcom-qmp-ufs.o \
            2>&1 | tee /tmp/canoe-ufs-phy-ci/object-build.log
          test -s out/canoe-ufs-phy/drivers/phy/qualcomm/phy-qcom-qmp-ufs.o
          llvm-nm -n out/canoe-ufs-phy/drivers/phy/qualcomm/phy-qcom-qmp-ufs.o \
            | tee /tmp/canoe-ufs-phy-ci/phy-qcom-qmp-ufs.nm
          grep -q qmp_ufs_probe /tmp/canoe-ufs-phy-ci/phy-qcom-qmp-ufs.nm
          sha256sum out/canoe-ufs-phy/drivers/phy/qualcomm/phy-qcom-qmp-ufs.o \
            | tee /tmp/canoe-ufs-phy-ci/phy-qcom-qmp-ufs.o.sha256
          if grep -E 'warning:|error:' /tmp/canoe-ufs-phy-ci/object-build.log; then
            echo 'Compiler warning or error detected in UFS PHY build' >&2
            exit 1
          fi

      - name: Verify no shared register headers changed
        run: |
          set -euxo pipefail
          git diff --quiet -- \
            drivers/phy/qualcomm/phy-qcom-qmp-qserdes-com-v6.h \
            drivers/phy/qualcomm/phy-qcom-qmp-qserdes-txrx-ufs-v7.h
          printf '%s\n' 'Linux v7.1 already supplies required register definitions.' \
            > /tmp/canoe-ufs-phy-ci/shared-header-delta.txt

      - name: Save validated UFS PHY patch
        run: |
          set -euxo pipefail
          git diff --binary --full-index > /tmp/canoe-ufs-phy-ci/ufs-phy-v7.1.patch
          git diff --stat > /tmp/canoe-ufs-phy-ci/ufs-phy-v7.1.stat
          git diff --name-status > /tmp/canoe-ufs-phy-ci/ufs-phy-v7.1.name-status
          git diff --check

      - name: Commit validated Canoe UFS PHY port
        run: |
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- \
            Documentation/devicetree/bindings/phy/qcom,sc8280xp-qmp-ufs-phy.yaml \
            drivers/phy/qualcomm/phy-qcom-qmp-ufs.c
          git diff --cached --check
          git commit -s -m 'phy: qcom-qmp-ufs: add Canoe support' \
            -m 'Add the Canoe UFS Gear 5 SERDES, lane and PCS programming tables.' \
            -m 'Reuse the UFS v7 register definitions and generalized table overlays already present in Linux v7.1.1.' \
            -m 'Validated with dt_binding_check and an ARM64 LLVM W=1 object build.'
          git push origin HEAD:port/canoe-ufs-phy-v7.1

      - name: Upload UFS PHY validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canoe-ufs-phy-v7.1-validation
          path: /tmp/canoe-ufs-phy-ci
          if-no-files-found: warn
          retention-days: 30

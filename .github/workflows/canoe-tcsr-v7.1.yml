name: Canoe TCSRCC v7.1 port

on:
  pull_request:
    branches:
      - bringup/canoe-v7.1
    paths:
      - .github/workflows/canoe-tcsr-v7.1.yml
      - tools/oneplus15-port/ci/port_canoe_tcsr_v71.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  port-and-validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - name: Check out TCSRCC port branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Fetch preserved Linux 6.12 branch
        run: |
          set -euxo pipefail
          git fetch --no-tags origin \
            backup/canoe-6.12-final-5555043:refs/remotes/origin/backup/canoe-6.12-final-5555043

      - name: Import and adapt Canoe TCSRCC
        env:
          OLD_REF: origin/backup/canoe-6.12-final-5555043
        run: |
          set -euxo pipefail
          python3 tools/oneplus15-port/ci/port_canoe_tcsr_v71.py
          git diff --check
          git status --short

      - name: Install kernel build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            clang \
            flex \
            libelf-dev \
            libssl-dev \
            lld \
            llvm \
            make

      - name: Configure Linux 7.1.1 TCSRCC build
        run: |
          set -euxo pipefail
          mkdir -p /tmp/canoe-tcsr-ci
          make \
            O=out/canoe-tcsr \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            defconfig \
            2>&1 | tee /tmp/canoe-tcsr-ci/defconfig.log
          scripts/config \
            --file out/canoe-tcsr/.config \
            --enable COMMON_CLK_QCOM \
            --enable SM_TCSRCC_CANOE
          make \
            O=out/canoe-tcsr \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            olddefconfig \
            2>&1 | tee /tmp/canoe-tcsr-ci/olddefconfig.log
          grep -qx 'CONFIG_COMMON_CLK_QCOM=y' out/canoe-tcsr/.config
          grep -qx 'CONFIG_SM_TCSRCC_CANOE=y' out/canoe-tcsr/.config
          cp out/canoe-tcsr/.config /tmp/canoe-tcsr-ci/config

      - name: Build Canoe TCSRCC object
        run: |
          set -euxo pipefail
          make \
            O=out/canoe-tcsr \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            W=1 \
            -j2 \
            drivers/clk/qcom/tcsrcc-canoe.o \
            2>&1 | tee /tmp/canoe-tcsr-ci/object-build.log
          test -s out/canoe-tcsr/drivers/clk/qcom/tcsrcc-canoe.o
          llvm-nm -n out/canoe-tcsr/drivers/clk/qcom/tcsrcc-canoe.o \
            | tee /tmp/canoe-tcsr-ci/tcsrcc-canoe.nm
          grep -q 'tcsr_cc_canoe_probe' /tmp/canoe-tcsr-ci/tcsrcc-canoe.nm
          grep -q 'tcsr_cc_canoe_init' /tmp/canoe-tcsr-ci/tcsrcc-canoe.nm
          sha256sum out/canoe-tcsr/drivers/clk/qcom/tcsrcc-canoe.o \
            | tee /tmp/canoe-tcsr-ci/tcsrcc-canoe.o.sha256
          if grep -E 'warning:|error:' /tmp/canoe-tcsr-ci/object-build.log; then
            echo 'Compiler warning or error detected in TCSRCC build' >&2
            exit 1
          fi

      - name: Save validated TCSRCC patch
        run: |
          set -euxo pipefail
          git diff --binary --full-index > /tmp/canoe-tcsr-ci/tcsrcc-v7.1.patch
          git diff --stat > /tmp/canoe-tcsr-ci/tcsrcc-v7.1.stat
          git diff --name-status > /tmp/canoe-tcsr-ci/tcsrcc-v7.1.name-status
          git diff --check

      - name: Commit validated Canoe TCSRCC port
        run: |
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- \
            drivers/clk/qcom/Kconfig \
            drivers/clk/qcom/Makefile \
            drivers/clk/qcom/tcsrcc-canoe.c \
            include/dt-bindings/clock/qcom,canoe-tcsr.h
          git diff --cached --check
          git commit -s -m 'clk: qcom: add Canoe TCSR clock controller' \
            -m 'Add the PCIe, UFS, USB2 and USB3 reference-clock gates for Qualcomm Canoe.' \
            -m 'Validated with an ARM64 LLVM W=1 object build.'
          git push origin HEAD:port/canoe-tcsr-v7.1

      - name: Upload TCSRCC validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canoe-tcsr-v7.1-validation
          path: /tmp/canoe-tcsr-ci
          if-no-files-found: warn
          retention-days: 30

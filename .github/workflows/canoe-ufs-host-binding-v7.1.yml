name: Canoe UFS host binding v7.1 port

on:
  pull_request:
    branches:
      - bringup/canoe-v7.1
    paths:
      - .github/workflows/canoe-ufs-host-binding-v7.1.yml
      - tools/oneplus15-port/ci/port_canoe_ufs_host_binding_v71.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  port-and-validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 40

    steps:
      - name: Check out UFS host binding branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Add Canoe UFS host binding
        run: |
          set -euxo pipefail
          mkdir -p /tmp/canoe-ufs-host-ci
          python3 tools/oneplus15-port/ci/port_canoe_ufs_host_binding_v71.py \
            2>&1 | tee /tmp/canoe-ufs-host-ci/port.log
          git diff --check
          git status --short

      - name: Install kernel and schema dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            clang \
            flex \
            libelf-dev \
            libssl-dev \
            lld \
            llvm \
            make \
            python3-venv
          python3 -m venv .venv-dtschema
          .venv-dtschema/bin/pip install --upgrade pip
          .venv-dtschema/bin/pip install dtschema
          echo "$PWD/.venv-dtschema/bin" >> "$GITHUB_PATH"

      - name: Validate Canoe UFS host binding
        run: |
          set -euxo pipefail
          make \
            O=out/canoe-ufs-host \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            DT_SCHEMA_FILES=Documentation/devicetree/bindings/ufs/qcom,ufs.yaml \
            dt_binding_check \
            2>&1 | tee /tmp/canoe-ufs-host-ci/dt-binding-check.log

      - name: Configure Linux 7.1.1 UFS host build
        run: |
          set -euxo pipefail
          make \
            O=out/canoe-ufs-host \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            defconfig \
            2>&1 | tee /tmp/canoe-ufs-host-ci/defconfig.log
          scripts/config \
            --file out/canoe-ufs-host/.config \
            --enable SCSI \
            --enable SCSI_UFSHCD \
            --enable SCSI_UFSHCD_PLATFORM \
            --enable SCSI_UFS_QCOM
          make \
            O=out/canoe-ufs-host \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            olddefconfig \
            2>&1 | tee /tmp/canoe-ufs-host-ci/olddefconfig.log
          cp out/canoe-ufs-host/.config /tmp/canoe-ufs-host-ci/config
          grep -Eq '^CONFIG_SCSI_UFS_QCOM=(y|m)$' out/canoe-ufs-host/.config

      - name: Build unchanged Linux 7.1 UFS host object
        run: |
          set -euxo pipefail
          make \
            O=out/canoe-ufs-host \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            W=1 \
            -j2 \
            drivers/ufs/host/ufs-qcom.o \
            2>&1 | tee /tmp/canoe-ufs-host-ci/object-build.log
          test -s out/canoe-ufs-host/drivers/ufs/host/ufs-qcom.o
          llvm-nm -n out/canoe-ufs-host/drivers/ufs/host/ufs-qcom.o \
            | tee /tmp/canoe-ufs-host-ci/ufs-qcom.nm
          grep -q ufs_qcom_mcq_config_resource /tmp/canoe-ufs-host-ci/ufs-qcom.nm
          sha256sum out/canoe-ufs-host/drivers/ufs/host/ufs-qcom.o \
            | tee /tmp/canoe-ufs-host-ci/ufs-qcom.o.sha256
          if grep -E 'warning:|error:' /tmp/canoe-ufs-host-ci/object-build.log; then
            echo 'Compiler warning or error detected in UFS host build' >&2
            exit 1
          fi

      - name: Verify host driver remains unchanged
        run: |
          set -euxo pipefail
          git diff --quiet -- \
            drivers/ufs/host/ufs-qcom.c \
            drivers/ufs/host/ufs-qcom.h
          printf '%s\n' 'Linux v7.1 already supplies Canoe-compatible MCQ resource support.' \
            > /tmp/canoe-ufs-host-ci/host-driver-delta.txt

      - name: Save validated host-binding patch
        run: |
          set -euxo pipefail
          git diff --binary --full-index > /tmp/canoe-ufs-host-ci/ufs-host-binding-v7.1.patch
          git diff --stat > /tmp/canoe-ufs-host-ci/ufs-host-binding-v7.1.stat
          git diff --name-status > /tmp/canoe-ufs-host-ci/ufs-host-binding-v7.1.name-status
          git diff --check

      - name: Commit validated Canoe UFS host binding
        run: |
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- Documentation/devicetree/bindings/ufs/qcom,ufs.yaml
          git diff --cached --check
          git commit -s -m 'dt-bindings: ufs: qcom: add Canoe controller' \
            -m 'Describe the Canoe nine-clock UFS host and its four standard, ICE and MCQ register windows.' \
            -m 'The Linux v7.1 qcom UFS host already contains the required MCQ resource handling.' \
            -m 'Validated with dt_binding_check and an ARM64 LLVM W=1 host object build.'
          git push origin HEAD:port/canoe-ufs-host-binding-v7.1

      - name: Upload UFS host validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canoe-ufs-host-binding-v7.1-validation
          path: /tmp/canoe-ufs-host-ci
          if-no-files-found: warn
          retention-days: 30

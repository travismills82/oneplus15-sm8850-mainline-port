name: Canoe GCC v7.1 port

on:
  pull_request:
    branches:
      - bringup/canoe-v7.1
    paths:
      - .github/workflows/canoe-gcc-v7.1.yml
      - tools/oneplus15-port/ci/port_canoe_gcc_v71.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  port-and-validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 40

    steps:
      - name: Check out GCC port branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Fetch preserved Linux 6.12 branch
        run: |
          set -euxo pipefail
          git fetch --no-tags origin \
            backup/canoe-6.12-final-5555043:refs/remotes/origin/backup/canoe-6.12-final-5555043

      - name: Import Canoe GCC without shared framework patches
        env:
          OLD_REF: origin/backup/canoe-6.12-final-5555043
        run: |
          set -euxo pipefail
          python3 tools/oneplus15-port/ci/port_canoe_gcc_v71.py
          git diff --check
          git status --short

      - name: Install kernel build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            clang \
            flex \
            libelf-dev \
            libssl-dev \
            lld \
            llvm \
            make

      - name: Configure Linux 7.1.1 GCC build
        run: |
          set -euxo pipefail
          mkdir -p /tmp/canoe-gcc-ci
          make \
            O=out/canoe-gcc \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            defconfig \
            2>&1 | tee /tmp/canoe-gcc-ci/defconfig.log
          scripts/config \
            --file out/canoe-gcc/.config \
            --enable COMMON_CLK_QCOM \
            --enable SM_GCC_CANOE
          make \
            O=out/canoe-gcc \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            olddefconfig \
            2>&1 | tee /tmp/canoe-gcc-ci/olddefconfig.log
          grep -qx 'CONFIG_COMMON_CLK_QCOM=y' out/canoe-gcc/.config
          grep -qx 'CONFIG_SM_GCC_CANOE=y' out/canoe-gcc/.config
          cp out/canoe-gcc/.config /tmp/canoe-gcc-ci/config

      - name: Build Canoe GCC object
        run: |
          set -euxo pipefail
          make \
            O=out/canoe-gcc \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            W=1 \
            -j2 \
            drivers/clk/qcom/gcc-canoe.o \
            2>&1 | tee /tmp/canoe-gcc-ci/object-build.log
          test -s out/canoe-gcc/drivers/clk/qcom/gcc-canoe.o
          llvm-nm -n out/canoe-gcc/drivers/clk/qcom/gcc-canoe.o \
            | tee /tmp/canoe-gcc-ci/gcc-canoe.nm
          grep -q 'gcc_canoe_probe' /tmp/canoe-gcc-ci/gcc-canoe.nm
          grep -q 'gcc_canoe_init' /tmp/canoe-gcc-ci/gcc-canoe.nm
          sha256sum out/canoe-gcc/drivers/clk/qcom/gcc-canoe.o \
            | tee /tmp/canoe-gcc-ci/gcc-canoe.o.sha256
          if grep -E 'warning:|error:' /tmp/canoe-gcc-ci/object-build.log; then
            echo 'Compiler warning or error detected in GCC build' >&2
            exit 1
          fi

      - name: Record shared clock-core delta
        run: |
          set -euxo pipefail
          mkdir -p /tmp/canoe-gcc-ci
          for path in \
            drivers/clk/qcom/clk-alpha-pll.c \
            drivers/clk/qcom/clk-alpha-pll.h \
            drivers/clk/qcom/clk-rpmh.c \
            include/dt-bindings/clock/qcom,rpmh.h
          do
            git diff --quiet HEAD -- "$path"
          done
          printf '%s\n' 'No shared clock-core files were modified.' \
            > /tmp/canoe-gcc-ci/shared-clock-core-delta.txt

      - name: Save validated GCC patch
        run: |
          set -euxo pipefail
          git diff --binary --full-index > /tmp/canoe-gcc-ci/gcc-v7.1.patch
          git diff --stat > /tmp/canoe-gcc-ci/gcc-v7.1.stat
          git diff --name-status > /tmp/canoe-gcc-ci/gcc-v7.1.name-status
          git diff --check

      - name: Commit validated Canoe GCC port
        run: |
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- \
            drivers/clk/qcom/Kconfig \
            drivers/clk/qcom/Makefile \
            drivers/clk/qcom/gcc-canoe.c \
            include/dt-bindings/clock/qcom,gcc-canoe.h
          git diff --cached --check
          git commit -s -m 'clk: qcom: add Canoe global clock controller' \
            -m 'Add the clocks, resets and power domains provided by the Qualcomm Canoe GCC.' \
            -m 'Linux v7.1.1 already contains the required Taycan PLL support, so no shared clock-core changes are carried.' \
            -m 'Validated with an ARM64 LLVM W=1 object build.'
          git push origin HEAD:port/canoe-gcc-v7.1

      - name: Upload GCC validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canoe-gcc-v7.1-validation
          path: /tmp/canoe-gcc-ci
          if-no-files-found: warn
          retention-days: 30

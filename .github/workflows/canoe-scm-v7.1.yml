name: Canoe SCM v7.1 validation

on:
  push:
    branches:
      - codex/canoe-scm-v7.1

permissions:
  contents: write

jobs:
  port-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 40

    steps:
      - name: Check out Canoe SCM branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: codex/canoe-scm-v7.1

      - name: Add Canoe SCM binding and node
        run: |
          set -euxo pipefail
          mkdir -p /tmp/canoe-scm-ci
          python3 - <<'PY'
          from pathlib import Path

          binding_path = Path("Documentation/devicetree/bindings/firmware/qcom,scm.yaml")
          dtsi_path = Path("arch/arm64/boot/dts/qcom/canoe.dtsi")

          binding = binding_path.read_text()
          old = "          - qcom,scm-apq8084\n          - qcom,scm-eliza\n"
          new = "          - qcom,scm-apq8084\n          - qcom,scm-canoe\n          - qcom,scm-eliza\n"
          if binding.count(old) != 1:
              raise SystemExit("unexpected SCM binding anchor count")
          binding_path.write_text(binding.replace(old, new, 1))

          dtsi = dtsi_path.read_text()
          old = "\t#size-cells = <2>;\n\n\tchosen {\n"
          new = (
              "\t#size-cells = <2>;\n\n"
              "\tfirmware {\n"
              "\t\tscm: scm {\n"
              "\t\t\tcompatible = \"qcom,scm-canoe\", \"qcom,scm\";\n"
              "\t\t};\n"
              "\t};\n\n"
              "\tchosen {\n"
          )
          if dtsi.count(old) != 1:
              raise SystemExit("unexpected Canoe DTSI anchor count")
          dtsi_path.write_text(dtsi.replace(old, new, 1))
          PY
          git diff --check
          git diff -- Documentation/devicetree/bindings/firmware/qcom,scm.yaml arch/arm64/boot/dts/qcom/canoe.dtsi | tee /tmp/canoe-scm-ci/source.patch

      - name: Install validation dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            clang \
            flex \
            libelf-dev \
            libssl-dev \
            lld \
            llvm \
            make \
            python3-venv
          python3 -m venv .venv-dtschema
          .venv-dtschema/bin/pip install --upgrade pip
          .venv-dtschema/bin/pip install dtschema
          echo "$PWD/.venv-dtschema/bin" >> "$GITHUB_PATH"

      - name: Validate SCM binding
        run: |
          set -euxo pipefail
          make \
            O=out/canoe-scm \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            DT_SCHEMA_FILES=Documentation/devicetree/bindings/firmware/qcom,scm.yaml \
            dt_binding_check \
            2>&1 | tee /tmp/canoe-scm-ci/dt-binding-check.log

      - name: Build Canoe OnePlus 15 DTB
        run: |
          set -euxo pipefail
          make \
            O=out/canoe-scm \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            defconfig \
            2>&1 | tee /tmp/canoe-scm-ci/defconfig.log
          make \
            O=out/canoe-scm \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            W=1 \
            qcom/canoe-oneplus-15.dtb \
            2>&1 | tee /tmp/canoe-scm-ci/dtb-build.log
          test -s out/canoe-scm/arch/arm64/boot/dts/qcom/canoe-oneplus-15.dtb

      - name: Validate Canoe SCM node
        run: |
          set -euxo pipefail
          make \
            O=out/canoe-scm \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            DT_SCHEMA_FILES='Documentation/devicetree/bindings/arm/qcom.yaml Documentation/devicetree/bindings/firmware/qcom,scm.yaml' \
            qcom/canoe-oneplus-15.dtb \
            dtbs_check \
            2>&1 | tee /tmp/canoe-scm-ci/dtbs-check.log
          out/canoe-scm/scripts/dtc/dtc \
            -I dtb \
            -O dts \
            out/canoe-scm/arch/arm64/boot/dts/qcom/canoe-oneplus-15.dtb \
            > /tmp/canoe-scm-ci/canoe-oneplus-15.compiled.dts
          grep -q 'qcom,scm-canoe' /tmp/canoe-scm-ci/canoe-oneplus-15.compiled.dts
          sha256sum \
            out/canoe-scm/arch/arm64/boot/dts/qcom/canoe-oneplus-15.dtb \
            | tee /tmp/canoe-scm-ci/canoe-oneplus-15.dtb.sha256

      - name: Run source checks
        run: |
          set -euxo pipefail
          git add \
            Documentation/devicetree/bindings/firmware/qcom,scm.yaml \
            arch/arm64/boot/dts/qcom/canoe.dtsi
          git diff --cached --check
          git diff --cached | scripts/checkpatch.pl --strict --no-tree - \
            2>&1 | tee /tmp/canoe-scm-ci/checkpatch.log

      - name: Commit validated Canoe SCM foundation
        run: |
          set -euxo pipefail
          git config user.name 'Travis Mills'
          git config user.email 'travismills82@gmail.com'
          git commit -s \
            -m 'dt-bindings: firmware: qcom,scm: add Canoe' \
            -m 'Document the Canoe SCM compatible and add the resource-free SCM firmware node to the minimal Canoe DTSI.' \
            -m 'Validated with targeted dt_binding_check, dtbs_check, and an ARM64 LLVM W=1 DTB build.'
          git push origin HEAD:codex/canoe-scm-v7.1

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canoe-scm-v7.1-validation
          path: /tmp/canoe-scm-ci
          if-no-files-found: warn
          retention-days: 30

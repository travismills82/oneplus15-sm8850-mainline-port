name: Canoe RPMh clocks v7.1 port

on:
  pull_request:
    branches: [bringup/canoe-v7.1]
    paths:
      - .github/workflows/canoe-rpmh-clk-v7.1.yml
      - tools/oneplus15-port/ci/port_canoe_rpmh_clk_v71.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  port-and-validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Add minimal Canoe RPMh clock descriptor
        run: |
          set -euxo pipefail
          mkdir -p /tmp/canoe-rpmh-clk-ci
          python3 tools/oneplus15-port/ci/port_canoe_rpmh_clk_v71.py 2>&1 | tee /tmp/canoe-rpmh-clk-ci/port.log
          git diff --check

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential clang flex libelf-dev libssl-dev lld llvm make python3-venv
          python3 -m venv .venv-dtschema
          .venv-dtschema/bin/pip install --upgrade pip
          .venv-dtschema/bin/pip install dtschema
          echo "$PWD/.venv-dtschema/bin" >> "$GITHUB_PATH"

      - name: Validate RPMh clock binding
        run: |
          set -euxo pipefail
          make O=out/canoe-rpmh-clk ARCH=arm64 LLVM=1 LLVM_IAS=1 DT_SCHEMA_FILES=Documentation/devicetree/bindings/clock/qcom,rpmhcc.yaml dt_binding_check 2>&1 | tee /tmp/canoe-rpmh-clk-ci/dt-binding-check.log

      - name: Configure and build RPMh clock object
        run: |
          set -euxo pipefail
          make O=out/canoe-rpmh-clk ARCH=arm64 LLVM=1 LLVM_IAS=1 defconfig
          scripts/config --file out/canoe-rpmh-clk/.config --enable COMMON_CLK_QCOM --enable QCOM_RPMHCC
          make O=out/canoe-rpmh-clk ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig
          grep -Eq '^CONFIG_QCOM_RPMHCC=(y|m)$' out/canoe-rpmh-clk/.config
          make O=out/canoe-rpmh-clk ARCH=arm64 LLVM=1 LLVM_IAS=1 W=1 -j2 drivers/clk/qcom/clk-rpmh.o 2>&1 | tee /tmp/canoe-rpmh-clk-ci/object-build.log
          test -s out/canoe-rpmh-clk/drivers/clk/qcom/clk-rpmh.o
          llvm-nm -n out/canoe-rpmh-clk/drivers/clk/qcom/clk-rpmh.o | tee /tmp/canoe-rpmh-clk-ci/clk-rpmh.nm
          sha256sum out/canoe-rpmh-clk/drivers/clk/qcom/clk-rpmh.o | tee /tmp/canoe-rpmh-clk-ci/clk-rpmh.o.sha256
          ! grep -E 'warning:|error:' /tmp/canoe-rpmh-clk-ci/object-build.log

      - name: Verify no RPMh core workaround was added
        run: |
          set -euxo pipefail
          git diff -- drivers/clk/qcom/clk-rpmh.c > /tmp/canoe-rpmh-clk-ci/clk-rpmh.patch
          ! grep -q 'clk_fixed_factor_ops' /tmp/canoe-rpmh-clk-ci/clk-rpmh.patch
          ! grep -q 'RPMH_CXO_PAD_CLK' /tmp/canoe-rpmh-clk-ci/clk-rpmh.patch
          git diff --check

      - name: Commit validated Canoe RPMh clocks
        run: |
          set -euxo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Documentation/devicetree/bindings/clock/qcom,rpmhcc.yaml drivers/clk/qcom/clk-rpmh.c
          git diff --cached --check
          git commit -s -m 'clk: qcom: rpmh: add Canoe clocks' -m 'Map Canoe to the existing /4 XO ARC clocks and IPA clock without carrying the old fixed-factor probe workaround.' -m 'Validated with dt_binding_check and an ARM64 LLVM W=1 object build.'
          git push origin HEAD:port/canoe-rpmh-clk-v7.1

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canoe-rpmh-clk-v7.1-validation
          path: /tmp/canoe-rpmh-clk-ci
          if-no-files-found: warn
          retention-days: 30

name: Canoe RPMh clocks v7.1 validation

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/canoe-rpmh-clk-v7.1.yml
      - Documentation/devicetree/bindings/clock/qcom,rpmhcc.yaml
      - drivers/clk/qcom/clk-rpmh.c
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 40

    steps:
      - name: Check out pull request head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify focused source delta
        run: |
          set -euxo pipefail
          mkdir -p /tmp/canoe-rpmh-clk-ci
          git diff --check origin/main...HEAD
          git diff origin/main...HEAD -- drivers/clk/qcom/clk-rpmh.c \
            > /tmp/canoe-rpmh-clk-ci/clk-rpmh.patch
          grep -q 'qcom,canoe-rpmh-clk' drivers/clk/qcom/clk-rpmh.c
          grep -q 'clk_rpmh_bi_tcxo_div4.hw' drivers/clk/qcom/clk-rpmh.c
          grep -q 'clk_rpmh_bi_tcxo_div4_ao.hw' drivers/clk/qcom/clk-rpmh.c
          grep -q 'clk_rpmh_ipa.hw' drivers/clk/qcom/clk-rpmh.c
          ! grep -q 'clk_fixed_factor_ops' /tmp/canoe-rpmh-clk-ci/clk-rpmh.patch
          ! grep -q 'RPMH_CXO_PAD_CLK' /tmp/canoe-rpmh-clk-ci/clk-rpmh.patch

      - name: Install kernel and schema dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            clang \
            flex \
            libelf-dev \
            libssl-dev \
            lld \
            llvm \
            make \
            python3-venv
          python3 -m venv .venv-dtschema
          .venv-dtschema/bin/pip install --upgrade pip
          .venv-dtschema/bin/pip install dtschema
          echo "$PWD/.venv-dtschema/bin" >> "$GITHUB_PATH"

      - name: Validate RPMh clock binding
        run: |
          set -euxo pipefail
          make \
            O=out/canoe-rpmh-clk \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            DT_SCHEMA_FILES=Documentation/devicetree/bindings/clock/qcom,rpmhcc.yaml \
            dt_binding_check \
            2>&1 | tee /tmp/canoe-rpmh-clk-ci/dt-binding-check.log

      - name: Build RPMh clock translation unit
        run: |
          set -euxo pipefail
          make \
            O=out/canoe-rpmh-clk \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            defconfig \
            2>&1 | tee /tmp/canoe-rpmh-clk-ci/defconfig.log
          make \
            O=out/canoe-rpmh-clk \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            W=1 \
            -j2 \
            drivers/clk/qcom/clk-rpmh.o \
            2>&1 | tee /tmp/canoe-rpmh-clk-ci/object-build.log
          test -s out/canoe-rpmh-clk/drivers/clk/qcom/clk-rpmh.o
          llvm-nm -n out/canoe-rpmh-clk/drivers/clk/qcom/clk-rpmh.o \
            | tee /tmp/canoe-rpmh-clk-ci/clk-rpmh.nm
          sha256sum out/canoe-rpmh-clk/drivers/clk/qcom/clk-rpmh.o \
            | tee /tmp/canoe-rpmh-clk-ci/clk-rpmh.o.sha256
          if grep -E 'warning:|error:' /tmp/canoe-rpmh-clk-ci/object-build.log; then
            echo 'Compiler warning or error detected in RPMh clock build' >&2
            exit 1
          fi

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canoe-rpmh-clk-v7.1-validation
          path: /tmp/canoe-rpmh-clk-ci
          if-no-files-found: warn
          retention-days: 30
